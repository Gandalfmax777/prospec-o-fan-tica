name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # `tsc --noEmit` sem -p/-b NÃO verifica nada neste projeto: o
      # tsconfig.json raiz é solution-style ("files": [] + references), então o
      # comando percorre zero arquivos e sai 0. Era o que rodava aqui, e foi
      # como 28 erros de tipo se acumularam sem o CI reclamar.
      #
      # `tsc -b` segue as references e verifica os dois projetos —
      # tsconfig.app.json (src/) e tsconfig.node.json (vite.config.ts).
      - name: Typecheck
        run: npm run typecheck

      # O vite build não typecheca (esbuild só remove os tipos), então este
      # passo cobre erros de bundling, não de tipagem.
      - name: Build
        run: npm run build
