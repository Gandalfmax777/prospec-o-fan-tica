name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push image
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.img.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_BETTER_AUTH_URL=${{ secrets.VITE_BETTER_AUTH_URL }}

  deploy:
    name: Trigger Coolify deploy
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Call Coolify webhook
        env:
          URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          TOKEN: ${{ secrets.COOLIFY_API_KEY }}
        run: |
          curl -fsSL --retry 3 --retry-delay 5 -X GET "$URL" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json"
